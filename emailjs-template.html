<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Message — Supratik Roy</title>
  <style>
    @media only screen and (max-width: 480px) {
      .card-pad  { padding-left: 20px !important; padding-right: 20px !important; }
      .hdr-pad   { padding: 24px 20px 18px !important; }
      .foot-pad  { padding: 16px 20px !important; }
      .reply-btn { display: block !important; text-align: center !important;
                   padding: 13px 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0a0e14;font-family:'DM Sans',Arial,sans-serif;">

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0"
         style="background-color:#0a0e14;padding:24px 12px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0"
               style="max-width:580px;background-color:#0D1117;border-radius:16px;
                      border:1px solid rgba(56,189,248,0.15);
                      box-shadow:0 0 40px rgba(56,189,248,0.08);">

          <!-- ── Top gradient bar ── -->
          <tr>
            <td style="height:4px;border-radius:16px 16px 0 0;
                       background:linear-gradient(90deg,#38BDF8 0%,#818CF8 50%,#C026D3 100%);">
            </td>
          </tr>

          <!-- ── Header ── -->
          <tr>
            <td class="hdr-pad" style="padding:32px 36px 24px;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;font-size:18px;font-weight:700;
                             color:#C9D1D9;letter-spacing:-0.3px;">
                    Supratik Roy
                  </td>
                  <td align="right" style="vertical-align:middle;">
                    <span style="font-family:'Courier New',monospace;
                                 font-size:10px;color:rgba(56,189,248,0.5);
                                 letter-spacing:0.08em;text-transform:uppercase;">
                      new&nbsp;message
                    </span>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <div style="height:1px;margin-top:20px;
                          background:linear-gradient(90deg,rgba(56,189,248,0.3) 0%,
                                     rgba(129,140,248,0.15) 60%,transparent 100%);">
              </div>

            </td>
          </tr>

          <!-- ── Sender info card ── -->
          <tr>
            <td class="card-pad" style="padding:0 36px 20px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                     style="background-color:#161B22;border-radius:12px;
                            border:1px solid rgba(255,255,255,0.07);">
                <tr>
                  <!-- Left cyan accent bar -->
                  <td style="width:3px;background:linear-gradient(180deg,#38BDF8,#818CF8);
                             border-radius:12px 0 0 12px;">
                  </td>
                  <td style="padding:18px 20px;">

                    <!-- Name row -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0"
                           style="margin-bottom:12px;">
                      <tr>
                        <td style="font-family:'Courier New',monospace;font-size:10px;
                                   color:#38BDF8;letter-spacing:0.1em;
                                   text-transform:uppercase;padding-bottom:4px;">
                          From
                        </td>
                      </tr>
                      <tr>
                        <td style="font-size:16px;font-weight:600;color:#C9D1D9;">
                          {{from_name}}
                        </td>
                      </tr>
                    </table>

                    <!-- Separator -->
                    <div style="height:1px;background:rgba(255,255,255,0.05);
                                margin-bottom:12px;"></div>

                    <!-- Email row -->
                    <table width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="font-family:'Courier New',monospace;font-size:10px;
                                   color:#818CF8;letter-spacing:0.1em;
                                   text-transform:uppercase;padding-bottom:4px;">
                          Reply-to
                        </td>
                      </tr>
                      <tr>
                        <td>
                          <a href="mailto:{{from_email}}"
                             style="font-size:14px;color:#38BDF8;
                                    text-decoration:none;word-break:break-all;">
                            {{from_email}}
                          </a>
                        </td>
                      </tr>
                    </table>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── Message block ── -->
          <tr>
            <td class="card-pad" style="padding:0 36px 32px;">

              <div style="font-family:'Courier New',monospace;font-size:10px;
                          color:rgba(129,140,248,0.7);letter-spacing:0.1em;
                          text-transform:uppercase;margin-bottom:10px;">
                Message
              </div>

              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                     style="background-color:#161B22;border-radius:12px;
                            border:1px solid rgba(255,255,255,0.07);">
                <tr>
                  <td style="padding:20px 22px;font-size:15px;line-height:1.7;
                             color:#C9D1D9;white-space:pre-wrap;word-break:break-word;">
                    {{message}}
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- ── Reply CTA ── -->
          <tr>
            <td class="card-pad" align="center" style="padding:0 36px 36px;">
              <a href="mailto:{{from_email}}" class="reply-btn"
                 style="display:inline-block;font-family:'Courier New',monospace;
                        font-size:13px;font-weight:700;letter-spacing:0.06em;
                        color:#38BDF8;text-decoration:none;
                        border:1px solid #38BDF8;border-radius:4px;
                        padding:11px 28px;">
                &#8617;&nbsp; Reply to {{from_name}}
              </a>
            </td>
          </tr>

          <!-- ── Bottom gradient bar ── -->
          <tr>
            <td style="height:1px;
                       background:linear-gradient(90deg,transparent 0%,
                                  rgba(56,189,248,0.2) 40%,
                                  rgba(129,140,248,0.2) 70%,transparent 100%);">
            </td>
          </tr>

          <!-- ── Footer ── -->
          <tr>
            <td class="foot-pad" style="padding:20px 36px;text-align:center;">
              <p style="margin:0 0 6px;font-family:'Courier New',monospace;
                        font-size:10px;color:rgba(201,209,217,0.3);
                        letter-spacing:0.08em;text-transform:uppercase;">
                Sent via your portfolio contact form
              </p>
              <a href="https://suroy92.github.io/Portfolio/"
                 style="font-size:11px;color:rgba(56,189,248,0.4);
                        text-decoration:none;font-family:'Courier New',monospace;">
                suroy92.github.io/Portfolio
              </a>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
